<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Empregado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ CSS DO TOPO -->
    <link rel="stylesheet" href="/topo.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6fb;
        }

        .container {
            margin-top: 120px;
            display: flex;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #3b82f6;
            outline: none;
        }

        /* 🔥 IMPORTANTE: NÃO AFETAR TOPO */
        .card button {
            padding: 12px;
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .card button:hover {
            background: #2563eb;
        }

        .card button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .msg {
            margin-top: 10px;
            font-size: 14px;
        }

        .erro {
            color: red;
        }

        .sucesso {
            color: green;
        }
    </style>

</head>

<body>

    <!-- ✅ TOPO -->
    <div id="topo-container"></div>

    <div class="container">
        <div class="card">

            <h2>Cadastro de Empregado</h2>

            <input id="nome" placeholder="Nome completo">
            <input id="matricula" placeholder="Matrícula">
            <input id="cargo" placeholder="Cargo (opcional)">

            <button id="btnSalvar" onclick="salvar()">Salvar</button>

            <div id="mensagem" class="msg"></div>

        </div>
    </div>

    <!-- ✅ SCRIPT DO TOPO -->
    <script src="/topo.js"></script>

    <script>
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") salvar()
        })

        async function salvar() {

            const nome = document.getElementById("nome").value.trim()
            const matricula = document.getElementById("matricula").value.trim()
            const cargo = document.getElementById("cargo").value.trim()
            const msg = document.getElementById("mensagem")
            const btn = document.getElementById("btnSalvar")

            msg.innerText = ""
            msg.className = "msg"

            if (!nome || !matricula) {
                msg.innerText = "⚠️ Preencha nome e matrícula"
                msg.classList.add("erro")
                return
            }

            btn.disabled = true
            btn.innerText = "Salvando..."

            try {

                const lista = await fetch("/empregados")
                const empregados = await lista.json()

                const existe = empregados.find(e => e.matricula == matricula)

                if (existe) {
                    msg.innerText = "❌ Já existe um empregado com essa matrícula"
                    msg.classList.add("erro")
                    btn.disabled = false
                    btn.innerText = "Salvar"
                    return
                }

                await fetch("/empregados", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, matricula, cargo })
                })

                msg.innerText = "✅ Empregado cadastrado com sucesso"
                msg.classList.add("sucesso")

                document.getElementById("nome").value = ""
                document.getElementById("matricula").value = ""
                document.getElementById("cargo").value = ""

            } catch (erro) {
                console.error(erro)
                msg.innerText = "❌ Erro ao salvar empregado"
                msg.classList.add("erro")
            }

            btn.disabled = false
            btn.innerText = "Salvar"
        }
    </script>

</body>

</html>
