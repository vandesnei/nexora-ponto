<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Gestor</title>
</head>

<div style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: #2f4a92;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    box-sizing: border-box;
    z-index: 999;
">

    <!-- ESQUERDA -->
    <div style="display:flex; align-items:center; gap:15px;">

        <img src="/img/logo.png" style="height:130px;">

        <div style="width:2px; height:30px; background:rgba(255,255,255,0.4);"></div>

        <div style="color:white; line-height:1.2;">
            <div style="font-size:14px; font-weight:bold;">
                Nexora Tecnologia e Inovação
            </div>
            <div style="font-size:11px; color:#cfd8ff;">
                Voando à Frente do seu Tempo
            </div>
        </div>

    </div>

</div>

<body>

    <h2>Cadastrar Professor</h2>

    <input id="nome" placeholder="Nome">
    <input id="cargo" placeholder="Cargo">

    <button onclick="cadastrar()">Cadastrar</button>

    <h3 id="msg"></h3>

    <script>

        function cadastrar() {

            const nome = document.getElementById("nome").value
            const cargo = document.getElementById("cargo").value

            fetch("http://localhost:3000/empregados", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nome, cargo })
            })

                .then(() => {
                    document.getElementById("msg").innerText = "Cadastrado!"
                })

        }

    </script>

</body>

</html>
